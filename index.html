    <style>
        .icon {
            position: absolute;
            bottom: 5px;
            right: 5px;
            height: 80px;
            width: 80px;
        }

        .logo {
            width: 300px;
            margin: 60px auto;
        }

        .column {
            text-align: center;
        }

        .img {
            max-width: 100%;
            width: 200px;
            margin: 10px;
            object-fit: contain;
            height: 200px;
        }

        .is-primary {
            background-color: #12333E !important;
            font-weight: bold;
        }

        .app-footer {
            text-align: center;

        }

        body {
            display: flex;
        }

        /* School */

        .box-school {
            width: 33.33%;
            height: 100vh;
            background-image: url(assets/school.jpg);
            background-position: center;
            background-size: cover;
            margin: 0;

            position: relative;
            cursor: pointer;
        }

        .box-school:hover {
            width: 33.33%;
            height: 100vh;
        }

        .box-school .inner-school {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: opacity 0.3s;
            text-align: center;
            padding: 20px;
        }

        .box-school .inner-school:hover {}

        .box-school .inner-school img {
            width: 80%;
            max-width: 250px;
            margin-top: 40px;
        }

        /* Teacher */

        .box-professor {
            width: 33.33%;
            height: 100vh;
            background-image: url(assets/professor.jpg);
            background-position: center;
            background-size: cover;

            margin: 0;
            position: relative;
            cursor: pointer;
        }

        .box-professor:hover {
            width: 33.33%;
            height: 100vh;
        }

        .box-professor .inner-professor {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: opacity 0.3s;
            text-align: center;
            padding: 20px;
        }

        .box-professor .inner-professor:hover {}

        .box-professor .inner-professor img {
            width: 80%;
            max-width: 250px;
            margin-top: 40px;
        }

        /* Student */

        .box-student {
            width: 33.33%;
            height: 100vh;
            background-image: url(assets/student.jpg);
            background-position: center;
            background-size: cover;

            margin: 0;
            position: relative;
            cursor: pointer;
        }

        .box-student:hover {
            width: 33.33%;
            height: 100vh;
        }

        .box-student .inner-student {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: opacity 0.3s;
            text-align: center;
            padding: 20px;
        }

        .box-student .inner-student:hover {
            /*opacity: 0.85;*/
        }

        .box-student .inner-student img {
            width: 80%;
            max-width: 250px;
            margin-top: 40px;
        }


        /* Utils */

        .display-flex {
            min-height: 80vh;
            display: flex;
        }

        .margin-auto {
            margin: auto;
        }

        .main-text {
            font-size: 2.75vw;
            color: white;
            font-weight: bold;
            text-shadow: 0px 0px 3px rgba(0, 0, 0, 0.3);
        }

        .arrow {
            width: 80px !important;
            margin-top: 40px;
        }

        .app-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: #12333E;
            padding: 5px;
            color: white;
        }

        .app-footer a {
            color: white;
        }

        .hover-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #12333E;
            opacity: 0;
            transition: all .3s;
        }

        .hover-bg:hover {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0.3;
        }

        @media only screen and (min-device-width : 320px) and (max-device-width : 480px) {
            /* Styles pour cette Media Queries */

            body {
                display: block;
                background-color: #12333E;
                height: 100vh;
            }

            .box-professor {
                width: 100% !important;
                height: 28vh !important;
            }

            .box-professor .inner-professor {
                opacity: 0.9;
            }


            .box-professor .inner-professor img {
                display: none;
                margin-top: 5px;
            }

            .box-school {
                width: 100% !important;
                height: 28vh !important;
            }

            .box-school .inner-school {
                opacity: 0.9;
            }

            .box-school .inner-school img {
                width: 80%;
                max-width: 125px;
                margin-top: 5px;
            }


            .box-school .inner-school img {
                display: none;
            }

            .box-student {
                width: 100% !important;
                height: 28vh !important;
            }

            .box-student .inner-student {
                opacity: 0.9;
            }

            .box-student .inner-student img {
                display: none;
                margin-top: 5px;
            }

            .display-flex {
                min-height: 26vh;
            }

            .main-text {
                font-size: 20px;
            }

            .arrow {
                display: none;
            }
        }

        a {
            color: inherit;
        }
    </style>
</head>

                    </span>

                </div>
            </div>
        </div>

    <script>
        // p'tite traduction

        var userLang = navigator.language || navigator.userLanguage;

        console.log("lang", userLang);
        if (userLang === "fr-FR" || userLang === "fr") {
            changeInnerHTML('translate_iamadministrator', "Je suis <br />administrateur·rice");
            changeInnerHTML('translate_iamteacher', "Je suis <br />intervenant·e");
            changeInnerHTML('translate_iamstudent', "Je suis <br />apprenant·e");
            changeInnerHTML('translate_website', "Site web");
            changeInnerHTML('translate_legalnotice', "Mentions légales");
            changeInnerHTML('translate_termsandconditionsofuse', "Conditions générales d'utilisation");
        } else {
            changeInnerHTML('translate_iamadministrator', "I'm an administrator");
            changeInnerHTML('translate_iamteacher', "I'm a professor");
            changeInnerHTML('translate_iamstudent', "I'm a student");
            changeInnerHTML('translate_website', "Website");
            changeInnerHTML('translate_legalnotice', "Legal Notice");
            changeInnerHTML('translate_termsandconditionsofuse', "Terms and conditions of use");
        }

        function changeInnerHTML(el, text) {
            document.getElementById(el).innerHTML = text;
        }
    </script>
