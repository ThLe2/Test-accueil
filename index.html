<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Edusign</title>
    <style>
        /* Réinitialisation des marges par défaut */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Empêche le défilement inutile */
        }

        /* Conteneur principal qui divise l'écran en 3 */
        .main-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Style de base pour chaque colonne cliquable */
        .box-link {
            width: 33.33%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            position: relative;
            cursor: pointer;
            transition: all 0.4s ease;
            background-position: center;
            background-size: cover;
            color: white;
            text-align: center;
        }

        /* Effet de survol : assombrit légèrement et zoome un peu */
        .box-link:hover {
            filter: brightness(1.1);
            width: 35%; /* La colonne s'élargit un peu au survol */
        }

        /* Overlay sombre pour rendre le texte lisible sur l'image */
        .box-link::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(18, 51, 62, 0.4); /* Couleur Edusign semi-transparente */
            z-index: 1;
        }

        /* Force le contenu à passer au-dessus de l'overlay */
        .box-link > * {
            position: relative;
            z-index: 2;
        }

        /* Images de fond spécifiques (vérifie bien tes noms de fichiers dans GitHub) */
        .bg-school { background-image: url('assets/school_bg.jpg'); }
        .bg-professor { background-image: url('assets/professor.jpg'); }
        .bg-student { background-image: url('assets/student_bg.jpg'); }

        /* Styles des icônes et textes */
        .img-icon {
            width: 80px;
            margin-bottom: 20px;
            filter: brightness(0) invert(1); /* Rend les icônes SVG blanches */
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-fake {
            background-color: #00d1b2; /* Couleur is-primary de Bulma */
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Logo flottant en haut à gauche */
        .logo-main {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 150px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <img src="assets/logo.svg" class="logo-main" alt="Logo">

    <div class="main-container">
        
        <a href="/school" class="box-link bg-school">
            <img src="assets/school.svg" class="img-icon">
            <h2>Administration</h2>
            <span class="btn-fake">Accès administration</span>
        </a>

        <a href="/professor" class="box-link bg-professor">
            <img src="assets/teacher.svg" class="img-icon">
            <h2>Intervenant</h2>
            <span class="btn-fake">Accès intervenant</span>
        </a>

        <a href="/student" class="box-link bg-student">
            <img src="assets/student.svg" class="img-icon">
            <h2>Apprenant</h2>
            <span class="btn-fake">Accès apprenant</span>
        </a>

    </div>

</body>
</html>
